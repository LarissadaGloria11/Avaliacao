name: Pipeline CI

on:
  push:
    branches:
      - main

jobs:

  validar-codigo:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar codigo
        uses: actions/checkout@v4

      - name: Validar projeto
        run: echo "Codigo validado com sucesso"

  build:
    runs-on: ubuntu-latest
    needs: validar-codigo

    steps:
      - name: Baixar codigo
        uses: actions/checkout@v4

      - name: Simular build
        run: echo "Build executado com sucesso"

  segredo:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Mostrar segredo
        run: echo "Mensagem secreta: ${{ secrets.MENSAGEM_SECRETA }}"