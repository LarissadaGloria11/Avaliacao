name: CI

on:
  push:
    branches: [ "main" ]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      - name: Instalar HTMLHint
        run: npm install -g htmlhint

      - name: Rodar Linter HTML
        run: htmlhint index.html