name: Pipeline CI

on:
  push:
    branches: [ "main" ]

jobs:

  validar-codigo:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Validar projeto
        run: echo "Código validado com sucesso!"

  build:
    runs-on: ubuntu-latest
    needs: validar-codigo

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Simular build
        run: echo "Build executado com sucesso!"