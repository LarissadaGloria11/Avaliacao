name: CI

on:
  push:
    branches: [ "main" ]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      - name: Verificar HTML (simples)
        run: |
          echo "Verificando HTML..."
          if grep -q "<html" index.html; then
            echo "HTML OK"
          else
            echo "Erro no HTML"
            exit 1
          fi